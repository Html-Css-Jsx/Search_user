<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chess.com User Search</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="card">
      <h2>Chess.com User Search</h2>

      <div class="searchBox">
        <input
          id="inp"
          type="text"
          minlength="3"
          maxlength="25"
          placeholder="Type username..."
        />

        <button id="searchBtn">Search</button>
      </div>
      <div id="resultBox">
        <p id="outp"></p>
      </div>

      <hr />

      <h3>Send Feedback</h3>

      <textarea id="feedback" placeholder="Write your feedback..."></textarea>

      <button id="sendFeedback">Send Feedback</button>

      <p id="fbmsg"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
